<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" href="/favicon.ico" sizes="32x32" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-brand" aria-label="Tessercode home">
        <img src="{{ '/assets/img/logo.svg' | relative_url }}" alt="Tessercode" class="nav-logo" />
      </a>

      <ul class="nav-links" id="nav-links">
        <li><a href="{{ '/research/' | relative_url }}">Research</a></li>
        <li><a href="{{ '/' | relative_url }}#tutorials">Tutorials</a></li>
        <li><a href="{{ '/' | relative_url }}#publications">Publications</a></li>
        <li><a href="{{ '/' | relative_url }}#about" class="nav-link-about">About</a></li>
      </ul>

      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p class="footer-brand">Tessercode</p>
      <p class="footer-desc">Neuromorphic Computing Research</p>
      <p class="footer-copy">&copy; {{ 'now' | date: "%Y" }} Tessercode. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const toggle = document.getElementById('nav-toggle');
    const links  = document.getElementById('nav-links');
    toggle.addEventListener('click', () => {
      const open = links.classList.toggle('is-open');
      toggle.setAttribute('aria-expanded', open);
    });

    // Close mobile menu on link click
    links.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => links.classList.remove('is-open'));
    });

    // Subtle nav shadow on scroll
    window.addEventListener('scroll', () => {
      document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });
  </script>

</body>
</html>
