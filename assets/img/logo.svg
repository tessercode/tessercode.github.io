<svg xmlns="http://www.w3.org/2000/svg" viewBox="48 44 550 106" width="550" height="106">
  <!--
    TesserCode navbar logo
    Color: rgb(31,28,27) = #1f1c1b
    Transparent background, tight crop for navbar use
  -->
  <defs>
    <clipPath id="logoClip">
      <rect x="0" y="0" width="200" height="200"/>
    </clipPath>
  </defs>

  <!-- ============ TESSERACT ICON ============ -->
  <g clip-path="url(#logoClip)">

    <!-- Outer cube — face fills are tinted derivations of #1f1c1b -->
    <!-- Top face: lightest -->
    <polygon points="100,54 142,77 100,100 58,77"
      fill="#1f1c1b" fill-opacity="0.10"
      stroke="#1f1c1b" stroke-width="1.5" opacity="1.0"/>
    <!-- Right face: mid -->
    <polygon points="142,77 142,123 100,146 100,100"
      fill="#1f1c1b" fill-opacity="0.07"
      stroke="#1f1c1b" stroke-width="1.5" opacity="1.0"/>
    <!-- Left face: slightly lighter -->
    <polygon points="58,77 100,100 100,146 58,123"
      fill="#1f1c1b" fill-opacity="0.07"
      stroke="#1f1c1b" stroke-width="1.5" opacity="1.0"/>

    <!-- Inner cube -->
    <!-- Top face -->
    <polygon points="100,63 122,76 100,89 78,76"
      fill="#1f1c1b" fill-opacity="0.13"
      stroke="#1f1c1b" stroke-width="1.1" opacity="0.85"/>
    <!-- Right face -->
    <polygon points="122,76 122,102 100,115 100,89"
      fill="#1f1c1b" fill-opacity="0.09"
      stroke="#1f1c1b" stroke-width="1.1" opacity="0.85"/>
    <!-- Left face -->
    <polygon points="78,76 100,89 100,115 78,102"
      fill="#1f1c1b" fill-opacity="0.09"
      stroke="#1f1c1b" stroke-width="1.1" opacity="0.85"/>

    <!-- 4D connector edges -->
    <line x1="100" y1="54"  x2="100" y2="63"  stroke="#1f1c1b" stroke-width="1.0" opacity="0.7"/>
    <line x1="142" y1="77"  x2="122" y2="76"  stroke="#1f1c1b" stroke-width="1.0" opacity="0.7"/>
    <line x1="142" y1="123" x2="122" y2="102" stroke="#1f1c1b" stroke-width="1.0" opacity="0.7"/>
    <line x1="100" y1="146" x2="100" y2="115" stroke="#1f1c1b" stroke-width="1.0" opacity="0.7"/>
    <line x1="58"  y1="123" x2="78"  y2="102" stroke="#1f1c1b" stroke-width="1.0" opacity="0.7"/>
    <line x1="58"  y1="77"  x2="78"  y2="76"  stroke="#1f1c1b" stroke-width="1.0" opacity="0.7"/>
    <line x1="100" y1="77"  x2="100" y2="89"  stroke="#1f1c1b" stroke-width="0.8" opacity="0.35" stroke-dasharray="2,2"/>

    <!-- Outer nodes -->
    <circle cx="100" cy="54"  r="3.0" fill="#1f1c1b" opacity="1.0"/>
    <circle cx="142" cy="77"  r="3.0" fill="#1f1c1b" opacity="1.0"/>
    <circle cx="142" cy="123" r="3.0" fill="#1f1c1b" opacity="1.0"/>
    <circle cx="100" cy="146" r="3.0" fill="#1f1c1b" opacity="1.0"/>
    <circle cx="58"  cy="123" r="3.0" fill="#1f1c1b" opacity="1.0"/>
    <circle cx="58"  cy="77"  r="3.0" fill="#1f1c1b" opacity="1.0"/>

    <!-- Inner nodes -->
    <circle cx="100" cy="63"  r="2.3" fill="#1f1c1b" opacity="0.75"/>
    <circle cx="122" cy="76"  r="2.3" fill="#1f1c1b" opacity="0.75"/>
    <circle cx="122" cy="102" r="2.3" fill="#1f1c1b" opacity="0.75"/>
    <circle cx="100" cy="115" r="2.3" fill="#1f1c1b" opacity="0.75"/>
    <circle cx="78"  cy="102" r="2.3" fill="#1f1c1b" opacity="0.75"/>
    <circle cx="78"  cy="76"  r="2.3" fill="#1f1c1b" opacity="0.75"/>

    <!-- Center convergence node -->
    <circle cx="100" cy="89" r="3.5" fill="#1f1c1b" opacity="1.0"/>
    <circle cx="100" cy="89" r="1.4" fill="#ffffff" opacity="0.9"/>

  </g>

  <!-- ============ WORDMARK ============ -->
  <text x="210" y="108"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="52"
    font-weight="300"
    letter-spacing="-1"
    fill="#1f1c1b"
    opacity="1.0">tesser</text>

  <text x="210" y="108"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="52"
    font-weight="700"
    letter-spacing="-1"
    fill="#1f1c1b"
    opacity="1.0"
    dx="211">code</text>

  <!-- Tagline -->
  <text x="212" y="132"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="11"
    font-weight="400"
    letter-spacing="3.5"
    fill="#1f1c1b"
    opacity="0.55">NEUROMORPHIC · RESEARCH</text>

  <!-- Separator line -->
  <line x1="212" y1="140" x2="590" y2="140" stroke="#1f1c1b" stroke-width="0.6" opacity="0.25"/>

</svg>
