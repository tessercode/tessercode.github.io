<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="gc" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gm" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gn" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="31" fill="#050c1a"/>
  <circle cx="32" cy="32" r="31" fill="none" stroke="#0099bb" stroke-width="0.6" opacity="0.4"/>

  <!-- Outer cube (scaled to fit 64x64, center 32,32) -->
  <!-- Original: center 100,100. Scale factor ~0.31 → offset 32 -->
  <!-- Top: 100,54→32,17  142,77→44,24  100,100→32,31  58,77→20,24 -->
  <polygon points="32,17 44,24 32,31 20,24"
    fill="#0099bb" fill-opacity="0.12" stroke="#0099bb" stroke-width="0.9" filter="url(#gc)"/>
  <!-- Right: 142,77→44,24  142,123→44,38  100,146→32,45  100,100→32,31 -->
  <polygon points="44,24 44,38 32,45 32,31"
    fill="#0099bb" fill-opacity="0.07" stroke="#0099bb" stroke-width="0.9" filter="url(#gc)"/>
  <!-- Left: 58,77→20,24  100,100→32,31  100,146→32,45  58,123→20,38 -->
  <polygon points="20,24 32,31 32,45 20,38"
    fill="#0099bb" fill-opacity="0.07" stroke="#0099bb" stroke-width="0.9" filter="url(#gc)"/>

  <!-- Inner cube (100,63→32,20  122,76→38,24  100,89→32,28  78,76→26,24) -->
  <!-- Scale: (x-100)*0.31+32, (y-100)*0.31+32 -->
  <polygon points="32,20 38,24 32,28 26,24"
    fill="#aa22dd" fill-opacity="0.15" stroke="#aa22dd" stroke-width="0.8" filter="url(#gm)"/>
  <!-- Right inner: 122,76→38,24  122,102→38,32  100,115→32,35  100,89→32,28 -->
  <polygon points="38,24 38,32 32,36 32,28"
    fill="#aa22dd" fill-opacity="0.10" stroke="#aa22dd" stroke-width="0.8" filter="url(#gm)"/>
  <!-- Left inner: 78,76→26,24  100,89→32,28  100,115→32,36  78,102→26,32 -->
  <polygon points="26,24 32,28 32,36 26,32"
    fill="#aa22dd" fill-opacity="0.10" stroke="#aa22dd" stroke-width="0.8" filter="url(#gm)"/>

  <!-- Connectors -->
  <line x1="32" y1="17" x2="32" y2="20" stroke="#4455cc" stroke-width="0.7" opacity="0.8"/>
  <line x1="44" y1="24" x2="38" y2="24" stroke="#4455cc" stroke-width="0.7" opacity="0.8"/>
  <line x1="44" y1="38" x2="38" y2="32" stroke="#4455cc" stroke-width="0.7" opacity="0.8"/>
  <line x1="32" y1="45" x2="32" y2="36" stroke="#4455cc" stroke-width="0.7" opacity="0.8"/>
  <line x1="20" y1="38" x2="26" y2="32" stroke="#4455cc" stroke-width="0.7" opacity="0.8"/>
  <line x1="20" y1="24" x2="26" y2="24" stroke="#4455cc" stroke-width="0.7" opacity="0.8"/>

  <!-- Outer nodes -->
  <circle cx="32" cy="17" r="1.4" fill="#00c8e0" filter="url(#gn)"/>
  <circle cx="44" cy="24" r="1.4" fill="#00c8e0" filter="url(#gn)"/>
  <circle cx="44" cy="38" r="1.4" fill="#00c8e0" filter="url(#gn)"/>
  <circle cx="32" cy="45" r="1.4" fill="#00c8e0" filter="url(#gn)"/>
  <circle cx="20" cy="38" r="1.4" fill="#00c8e0" filter="url(#gn)"/>
  <circle cx="20" cy="24" r="1.4" fill="#00c8e0" filter="url(#gn)"/>

  <!-- Inner nodes -->
  <circle cx="32" cy="20" r="1.1" fill="#cc44ee" filter="url(#gn)"/>
  <circle cx="38" cy="24" r="1.1" fill="#cc44ee" filter="url(#gn)"/>
  <circle cx="38" cy="32" r="1.1" fill="#cc44ee" filter="url(#gn)"/>
  <circle cx="32" cy="36" r="1.1" fill="#cc44ee" filter="url(#gn)"/>
  <circle cx="26" cy="32" r="1.1" fill="#cc44ee" filter="url(#gn)"/>
  <circle cx="26" cy="24" r="1.1" fill="#cc44ee" filter="url(#gn)"/>

  <!-- Center node -->
  <circle cx="32" cy="28" r="1.8" fill="#4455cc" filter="url(#gn)"/>
  <circle cx="32" cy="28" r="0.7" fill="#ffffff"/>
</svg>
